    <script>
        // ================= CONFIG =================
        const TARGET_PAGE = 'info.html';
        const COUNTDOWN_SECONDS = 5;
        // ===========================================

        const confirmBtn = document.getElementById('confirmBtn');
        const timerText = document.getElementById('timerText');
        let isProcessing = false;

        confirmBtn.addEventListener('click', () => {
            if (isProcessing) return;
            isProcessing = true;
            
            confirmBtn.disabled = true;
            confirmBtn.classList.add('counting');
            confirmBtn.innerHTML = '⏳ Please Wait...';
            
            let timeLeft = COUNTDOWN_SECONDS;
            timerText.textContent = `Redirecting in ${timeLeft}s...`;
            
            const countdown = setInterval(() => {
                timeLeft--;
                timerText.textContent = timeLeft > 0 ? `Redirecting in ${timeLeft}s...` : '✅ Redirecting Now!';
                confirmBtn.innerHTML = timeLeft > 0 ? `⏳ ${timeLeft}s` : '✅ Done!';
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    setTimeout(() => {
                        window.location.href = TARGET_PAGE;
                    }, 300);
                }
            }, 1000);
        });

        console.log('✅ confirm.html loaded. 320x50 banner added. Scroll + 5s timer ready.');
