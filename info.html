    <script>
        // ================= CONFIG =================
        const NEXT_PAGE = 'info2.html'; // Agla question page
        const MONETAG_LINK = 'https://omg10.com/4/10844539';
        // ===========================================
        // 3-Dot Menu Toggle
        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('active');
        });
        document.addEventListener('click', (e) => {
            if (!menuBtn.contains(e.target) && !menuDropdown.contains(e.target)) {
                menuDropdown.classList.remove('active');
            }
        });
        function openMonetagLink(e) {
            e.preventDefault();
            menuDropdown.classList.remove('active');
            window.open(MONETAG_LINK, '_blank');
        }

        // Option Selection Logic
        const optionsList = document.getElementById('optionsList');
        const nextBtn = document.getElementById('nextBtn');
        const radioButtons = document.querySelectorAll('input[name="q1"]');
        
        optionsList.addEventListener('click', (e) => {
            // Label pe click karne se radio select ho
            if (e.target.classList.contains('option-label') || e.target.classList.contains('option-text')) {
                const label = e.target.closest('.option-label');
                const radio = label.querySelector('.option-radio');
                radio.checked = true;
                updateSelection();
            }
        });
        
        radioButtons.forEach(radio => {
            radio.addEventListener('change', updateSelection);
        });
        
        function updateSelection() {
            // Remove selected class from all
            document.querySelectorAll('.option-label').forEach(lbl => lbl.classList.remove('selected'));
            
            // Add selected class to chosen
            const checked = document.querySelector('input[name="q1"]:checked');
            if (checked) {
                checked.closest('.option-label').classList.add('selected');
                nextBtn.disabled = false;
            } else {
                nextBtn.disabled = true;
            }
        }        
        // Next Button Click → Redirect to info2.html
        nextBtn.addEventListener('click', () => {
            const selected = document.querySelector('input[name="q1"]:checked');
            if (selected) {
                // Optional: Save answer to localStorage for later use
                localStorage.setItem('survey_q1', selected.value);
                console.log(`✅ Q1 Answer: ${selected.value} years → Redirecting to ${NEXT_PAGE}`);
                
                // Visual feedback
                nextBtn.innerHTML = '⏳ Loading...';
                nextBtn.disabled = true;
                
                setTimeout(() => {
                    window.location.href = NEXT_PAGE;
                }, 400);
            }
        });
        
        console.log('✅ info.html loaded. Q1 ready. Ads active.');
    </script>
